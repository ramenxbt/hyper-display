name: Bug report
description: Something is broken or behaving unexpectedly.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please fill in as much as you can.
  - type: input
    id: version
    attributes:
      label: Hyper-Display version
      description: From `package.json` or `git describe --tags`.
      placeholder: e.g. v0.9.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows 11
        - Windows 10
        - Ubuntu / Debian
        - Other Linux
    validations:
      required: true
  - type: input
    id: os-version
    attributes:
      label: OS version
      placeholder: e.g. macOS 15.4, Windows 11 24H2, Ubuntu 24.04
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Numbered steps the maintainer can follow.
      placeholder: |
        1. Launch the app.
        2. Paste address 0x...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: console
    attributes:
      label: Console / log output
      description: Open dev tools (Cmd+Opt+I on macOS, F12 on Windows / Linux) and paste anything red.
      render: shell
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Drag images here if it helps.
